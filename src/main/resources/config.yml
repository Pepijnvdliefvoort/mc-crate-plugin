# Crate definitions. Keys and crates match by crate id.
crates:
  basic:
    block: PURPLE_SHULKER_BOX
    gui:
      title: "&dBasic Crate"
      size: 27
    animation:
      ticks: 80       # total duration (higher = longer animation)
      interval: 3     # base reel speed (higher = slower from start to finish)
      finalSlot: 13   # unused by 7-slot reel, kept for backward compatibility
    key:
      material: TRIPWIRE_HOOK
      name: "&dBasic Key"
      lore:
        - "&7Use this on a Basic Crate"
    loot:
      - weight: 60
        item:
          material: DIAMOND
          amount: 8
          name: "&bDiamonds"
          lore:
            - "&7Lucky!"
      - weight: 30
        item:
          material: GOLD_INGOT
          amount: 16
          name: "&6Gold"
      - weight: 10
        item:
          material: NETHERITE_INGOT
          amount: 1
          name: "&8Netherite"
